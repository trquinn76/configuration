plugins {
    id 'java-library'
    id 'jacoco'
    id 'maven-publish'
    id 'org.jreleaser' version '1.23.0'
}

repositories {
    mavenLocal()
    mavenCentral()
}

group = 'io.github.trquinn76'

version = '1.0.0'

dependencies {
    testImplementation 'uk.org.webcompere:system-stubs-jupiter:2.1.8'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

testing {
    suites {
        test {
            useJUnitJupiter()
        }
    }
}

test {
    finalizedBy jacocoTestReport // report is always generated after tests run
}
jacocoTestReport {
    dependsOn test // tests are required to run before generating the report
}

javadoc {
    failOnError = false
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'io.github.trquinn76'
            artifactId = 'configuration'

            from components.java

            pom {
                name = 'Configuration'
                description = "A library for getting configuration values"
                inceptionYear = "2025"
                url = "https://github.com/trquinn76/configuration"
                licenses {
                    license {
                        name = 'MIT Licence'
                        url = 'https://github.com/trquinn76/configuration/blob/master/LICENSE'
                    }
                }
                developers {
                    developer {
                        id = 'trqinn76'
                        name = 'Tim Quinn'
                        url = 'https://github.com/trquinn76'
                    }
                }
                scm {
                    url = 'http://github.com/trquinn/configuration'
                    connection = 'scm:git:https://github.com/trquinn76/configuration.git'
                    developerConnection = 'scm:git:ssh://github.com/trquinn76/configuration.git'
                }
            }
        }
    }

    repositories {
        maven {
            url = layout.buildDirectory.dir('staging-deploy')
        }
    }
}

jreleaser {
    signing {
        active = 'ALWAYS'
        armored = true
    }
    deploy {
        maven {
            mavenCentral {
                sonatype {
                    active = 'ALWAYS'
                    url = 'https://central.sonatype.com/api/v1/publisher'
                    stagingRepository('build/staging-deploy')
                }
            }
        }
    }
    release {
        github {
            repoOwner = 'trquinn76'
            skipRelease = true
        }
    }
}
